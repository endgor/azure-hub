name: Update Azure Data

on:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allow manual triggering

# This workflow updates both Azure IP ranges and RBAC role definitions
# Required GitHub Secrets:
#   AZURE_CLIENT_ID, AZURE_CLIENT_SECRET, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
# The service principal needs read permissions on role definitions

jobs:
  update-azure-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # This is crucial for allowing the workflow to push changes
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history so pushing works

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Update Azure IP data
        run: npm run update-ip-data

      - name: Update Private DNS zone data
        run: npm run update-private-dns-zones

      - name: Build Azure credentials JSON
        run: |
          creds=$(jq -nc \
            --arg cid "$AZURE_CLIENT_ID" \
            --arg cs  "$AZURE_CLIENT_SECRET" \
            --arg tid "$AZURE_TENANT_ID" \
            --arg sid "$AZURE_SUBSCRIPTION_ID" \
            '{clientId:$cid, clientSecret:$cs, tenantId:$tid, subscriptionId:$sid}')
          echo "::add-mask::$creds"
          echo "AZURE_CREDENTIALS<<EOF" >> "$GITHUB_ENV"
          echo "$creds" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ env.AZURE_CREDENTIALS }}

      - name: Update Azure RBAC data
        run: npm run update-rbac-data

      - name: Update Entra ID roles data
        run: npm run fetch-entraid-roles

      - name: Commit and push if changed
        id: commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git status
          git diff --staged --quiet && echo "changes=false" >> $GITHUB_OUTPUT || (git commit -m "chore: update Azure IP and RBAC data" && git push && echo "changes=true" >> $GITHUB_OUTPUT)

      - name: Submit URLs to IndexNow
        if: steps.commit.outputs.changes == 'true'
        run: npm run submit-indexnow -- --all
